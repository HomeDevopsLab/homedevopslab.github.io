version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 21
  pre_build:
    commands:
      - echo "Installing dependencies"
      - cd doc
      - npm install
  build:
    commands:
      - echo "Building the application"
      - cd doc
      - npm run docs:build
  post_build:
    commands:
      - echo "Build completed on `date`"