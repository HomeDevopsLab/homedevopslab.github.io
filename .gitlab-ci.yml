stages:
  - docker_secret
  - deploy

vault secret:
  stage: docker_secret
  image: devkrolikowski/iac-tools:v1.4.0
  id_tokens:
    VAULT_ID_TOKEN:
      aud: $VAULT_SERVER_URL
  script: |
    echo "🔑 Logowanie do Vault"
    export VAULT_ADDR=$VAULT_SERVER_URL
    export VAULT_TOKEN=$(vault write -field=token auth/jwt/login \
      role=$VAULT_AUTH_ROLE \
      jwt=$VAULT_ID_TOKEN)
    vault kv get -format=json kv/platforms/docker | jq -r '.data.data | to_entries[] | "export \(.key)='\''\(.value | tostring)'\''"' > secrets.env
  artifacts:
    paths:
      - secrets.env
    expire_in: "30 days"
  only:
    - tags

publish to docker registry:
  stage: deploy
  needs:
    - vault secret

  image: jdrouet/docker-with-buildx:stable

  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2

  script:
    - source secrets.env
    - rm -f secret.env
    - echo "$DOCKER_REGISTRY_TOKEN" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker buildx create --use
    - docker buildx build
      --platform linux/arm/v7,linux/arm64/v8,linux/amd64
      --tag ${CI_REGISTRY_IMAGE}:$CI_COMMIT_TAG
      --push .
  only:
    - tags
  except:
    - branches
